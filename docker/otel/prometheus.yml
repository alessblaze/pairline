global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    metrics_path: /metrics
    static_configs:
      - targets: ["otel-collector:9464"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: otel-collector
