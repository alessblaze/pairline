          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass pairline-dev-redis-password \
          --masterauth pairline-dev-redis-password
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.24
    ports:
      - "7004:7004"
    volumes:
      - redis_node_5_data:/data

  redis-node-6:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-node-6
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7005 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass pairline-dev-redis-password \
          --masterauth pairline-dev-redis-password
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.25
    ports:
      - "7005:7005"
    volumes:
      - redis_node_6_data:/data

  redis-cluster-init:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    restart: "no"
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        for target in \
          redis-node-1:7000 \
          redis-node-2:7001 \
          redis-node-3:7002 \
          redis-node-4:7003 \
          redis-node-5:7004 \
          redis-node-6:7005
        do
          host="$${target%:*}"
          port="$${target#*:}"
          until valkey-cli -h "$$host" -p "$$port" -a pairline-dev-redis-password PING >/dev/null 2>&1; do
            sleep 1
          done
        done

        if valkey-cli -h redis-node-1 -p 7000 -a pairline-dev-redis-password cluster info 2>/dev/null | grep -q 'cluster_state:ok'; then
          echo "Redis cluster already initialized"
          exit 0
        fi

        existing_nodes="$$(valkey-cli -h redis-node-1 -p 7000 -a pairline-dev-redis-password cluster nodes 2>/dev/null | grep -c . || true)"
        if [ "$$existing_nodes" -gt 1 ]; then
          echo "Redis cluster already configured; waiting for healthy state"
          for attempt in $$(seq 1 30); do
            if valkey-cli -h redis-node-1 -p 7000 -a pairline-dev-redis-password cluster info 2>/dev/null | grep -q 'cluster_state:ok'; then
              echo "Redis cluster already initialized"
              exit 0
            fi
            sleep 1
          done
          echo "Redis cluster is configured but not healthy yet"
          exit 1
        fi

        for target in \
          redis-node-1:7000 \
          redis-node-2:7001 \
          redis-node-3:7002 \
          redis-node-4:7003 \
          redis-node-5:7004 \
          redis-node-6:7005
        do
          host="$${target%:*}"
          port="$${target#*:}"
          dbsize="$$(valkey-cli -h "$$host" -p "$$port" -a pairline-dev-redis-password DBSIZE 2>/dev/null || true)"
          if [ -n "$$dbsize" ] && [ "$$dbsize" != "0" ]; then
            echo "Redis node $$host:$$port already contains data; refusing to create a new cluster on non-empty volumes"
            exit 1
          fi
        done

        yes yes | valkey-cli --cluster create \
          redis-node-1:7000 \
          redis-node-2:7001 \
          redis-node-3:7002 \
          redis-node-4:7003 \
          redis-node-5:7004 \
          redis-node-6:7005 \
          --cluster-replicas 1 \
          -a pairline-dev-redis-password
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.26

  postgres:
    image: registry.suse.com/suse/postgres:17-contrib
    container_name: pairline-postgres
    environment:
      POSTGRES_DB: omegle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d omegle"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.30
    volumes:
      - postgres_cluster_data:/var/lib/pgsql/data

  phoenix1:
    image: *phoenix_image
    container_name: pairline-phoenix1
    hostname: phoenix1
    working_dir: /app
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      PHX_HOST: localhost
      REDIS_HOST: redis-node-1
      REDIS_PORT: "7000"
      REDIS_CLUSTER_NODES: redis-node-1:7000,redis-node-2:7001,redis-node-3:7002
      REDIS_PASSWORD: pairline-dev-redis-password
      SHARED_SECRET: pairline-dev-shared-secret
      SECRET_KEY_BASE: pairline-dev-secret-key-base
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      TRUSTED_PROXY_CIDRS: 127.0.0.0/8,::1/128,172.16.0.0/12
      NODE_NAME: phoenix1
      NODE_COOKIE: pairline-dev-cookie
      CLUSTER_NODES: phoenix1@phoenix1,phoenix2@phoenix2,phoenix3@phoenix3
      NODE_DISTRIBUTION: short
      CLUSTER_CONNECT_INTERVAL_MS: "2000"
      REAPER_INTERVAL_MS: "5000"
      TURNSTILE_SECRET_KEY: 1x0000000000000000000000000000000AA
      SKIP_DOTENV: "1"
      MIX_ENV: dev
      OTEL_SERVICE_NAME: pairline-phoenix
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_ENVIRONMENT: docker
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.11
    volumes:
      - ../backend/elixir/omegle_phoenix:/app
      - phoenix1_deps:/app/deps
      - phoenix1_build:/app/_build
      - phoenix1_hex:/root/.hex
      - phoenix1_rebar:/root/.cache/rebar3
    command:
      - /bin/bash
      - -lc
      - |
        mix local.hex --force &&
        mix local.rebar --force &&
        mix deps.get &&
        ./start.sh

