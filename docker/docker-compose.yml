x-phoenix-image: &phoenix_image pairline-phoenix:local

services:
  jaeger:
    image: jaegertracing/jaeger:latest
    container_name: pairline-jaeger
    depends_on:
      - prometheus
    command:
      - --config
      - /jaeger/config-v2.yaml
    ports:
      - "16686:16686"
      - "16685:16685"
      - "4317:4317"
      - "4318:4318"
      - "14250:14250"
      - "14268:14268"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "9411:9411"
      - "8888:8888"
      - "8889:8889"
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.5
    volumes:
      - ./jaeger/ui-config.json:/etc/jaeger/ui-config.json:ro
      - ./jaeger/config-v2.yaml:/jaeger/config-v2.yaml:ro

  prometheus:
    image: prom/prometheus:latest
    container_name: pairline-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./otel/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.7

  grafana:
    image: grafana/grafana:latest
    container_name: pairline-grafana
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboard.json:/etc/grafana/dashboards/pairline-dashboard.json:ro
      - grafana_data:/var/lib/grafana
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.8

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pairline-otel-collector
    depends_on:
      - jaeger
      - prometheus
    command:
      - --config=/etc/otelcol/config.yaml
    volumes:
      - ./otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "9464:9464"
      - "13133:13133"
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.6

  nginx:
    image: nginx:stable
    container_name: pairline-nginx
    depends_on:
      - phoenix1
      - phoenix2
      - phoenix3
      - golang-public-1
      - golang-public-2
      - golang-admin
    ports:
      - "8080:8080"
      - "8081:8081"
      - "50050:50050"
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.10
    volumes:
      - ./nginx/pairline.conf:/etc/nginx/conf.d/default.conf:ro

  redis-node-1:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-node-1
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7000 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass pairline-dev-redis-password \
          --masterauth pairline-dev-redis-password
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.20
    ports:
      - "7000:7000"
    volumes:
      - redis_node_1_data:/data

  redis-node-2:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-node-2
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7001 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass pairline-dev-redis-password \
          --masterauth pairline-dev-redis-password
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.21
    ports:
      - "7001:7001"
    volumes:
      - redis_node_2_data:/data

  redis-node-3:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-node-3
    command:
