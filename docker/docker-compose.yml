services:
  nginx:
    image: nginx:stable
    container_name: pairline-nginx
    depends_on:
      - phoenix1
      - phoenix2
      - phoenix3
      - golang-public-1
      - golang-public-2
      - golang-admin
    ports:
      - "8080:8080"
      - "8081:8081"
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.10
    volumes:
      - ./nginx/pairline.conf:/etc/nginx/conf.d/default.conf:ro

  redis-node-1:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-node-1
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7000 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass pairline-dev-redis-password \
          --masterauth pairline-dev-redis-password
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.20
    ports:
      - "7000:7000"
    volumes:
      - redis_node_1_data:/data

  redis-node-2:
    image: valkey/valkey:9-trixie
