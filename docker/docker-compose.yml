  phoenix3_deps:
  phoenix3_build:
  phoenix3_hex:
  phoenix3_rebar:
  golang_mod_cache:
  golang_build_cache:

networks:
  pairline_cluster:
    name: pairline_cluster
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
