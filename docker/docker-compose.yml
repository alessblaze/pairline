  golang-public-1:
    image: registry.suse.com/bci/golang:1.26
    container_name: pairline-golang-public-1
    working_dir: /app
    depends_on:
      redis-cluster-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      PORT: "8081"
      HOST: "0.0.0.0"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: omegle
      POSTGRES_SSLMODE: disable
      REDIS_CLUSTER_NODES: redis-node-1:7000,redis-node-2:7001,redis-node-3:7002
      REDIS_PASSWORD: pairline-dev-redis-password
      SHARED_SECRET: pairline-dev-shared-secret
      JWT_SECRET: pairline-dev-jwt-secret-must-be-32-characters-long
      ROOT_ADMIN_USERNAME: admin
      ROOT_ADMIN_PASSWORD: adminpassword123
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080
      TRUSTED_PROXY_CIDRS: 127.0.0.0/8,::1/128,172.16.0.0/12
      GOCACHE: /tmp/go-build
      REDIS_MAINT_NOTIFICATIONS_MODE: disabled
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_ENVIRONMENT: docker
      TURN_MODE: integrated
      TURN_REALM: pairline
      TURN_STATIC_AUTH_SECRET: pairline-dev-turn-session
      TURN_CONTROL_GRPC_LISTEN_ADDRESS: 0.0.0.0:50051
      TURN_CONTROL_GRPC_SHARED_SECRET: pairline-dev-turn-control
      TURN_STUN_SERVERS: stun:stun.cloudflare.com:3478,stun:stun.l.google.com:19302
      TURN_SERVER_URLS: turn:127.0.0.1:53478?transport=udp,turn:127.0.0.1:53478?transport=tcp,turn:127.0.0.1:53479?transport=udp,turn:127.0.0.1:53479?transport=tcp
    ports:
      - "50051:50051"
    healthcheck:
      test: ["CMD", "bash", "-lc", "exec 3<>/dev/tcp/127.0.0.1/8081 && printf 'GET /health HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && grep -q '200 OK' <&3"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      pairline_cluster:
        ipv4_address: 172.30.0.40
    volumes:
      - ../backend/golang:/app
      - golang_mod_cache:/go/pkg/mod
      - golang_build_cache:/tmp/go-build
    command:
      - /bin/bash
      - -lc
      - |
        go mod download &&
        go run ./cmd/public

