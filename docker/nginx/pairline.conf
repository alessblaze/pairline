upstream phoenix_cluster {
    zone phoenix_cluster 64k;
    random two least_conn;
    server 172.30.0.11:8080;
    server 172.30.0.12:8081;
}

upstream golang_public_backend {
    zone golang_public_backend 64k;
    random two least_conn;
    server 172.30.0.40:8081;
    server 172.30.0.42:8081;
}

upstream golang_admin_backend {
    server 172.30.0.41:8082;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 8080;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API Hardening
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; form-action 'none';" always;

    location = /api/health {
        proxy_pass http://phoenix_cluster;
    }

    location /ws {
        proxy_pass http://phoenix_cluster;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Route not configured on Phoenix ingress"}';
    }
}

server {
    listen 8081;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # API Hardening
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'; form-action 'none';" always;

    location = /health {
        proxy_pass http://golang_public_backend;
    }

    location ^~ /api/v1/admin/ {
        proxy_pass http://golang_admin_backend;
    }

    location ^~ /api/v1/moderation/ {
        proxy_pass http://golang_public_backend;
    }

    location ^~ /api/v1/webrtc/ {
        proxy_pass http://golang_public_backend;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        default_type application/json;
        return 404 '{"error":"Route not configured on Go ingress"}';
    }
}
