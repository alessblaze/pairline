services:
  redis-node-1:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-1
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7000 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass testpassword123 \
          --masterauth testpassword123
    ports:
      - "7000:7000"
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.11
    volumes:
      - redis_node_1_data:/data

  redis-node-2:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-2
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7001 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass testpassword123 \
          --masterauth testpassword123
    ports:
      - "7001:7001"
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.12
    volumes:
      - redis_node_2_data:/data

  redis-node-3:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-3
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7002 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass testpassword123 \
          --masterauth testpassword123
    ports:
      - "7002:7002"
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.13
    volumes:
      - redis_node_3_data:/data

  redis-node-4:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-4
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7003 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass testpassword123 \
          --masterauth testpassword123
    ports:
      - "7003:7003"
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.14
    volumes:
      - redis_node_4_data:/data

  redis-node-5:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-5
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7004 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass testpassword123 \
          --masterauth testpassword123
    ports:
      - "7004:7004"
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.15
    volumes:
      - redis_node_5_data:/data

  redis-node-6:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-6
    command:
      - /bin/sh
      - -lc
      - |
        exec valkey-server \
          --port 7005 \
          --bind 0.0.0.0 \
          --protected-mode no \
          --appendonly yes \
          --cluster-enabled yes \
          --cluster-config-file /data/nodes.conf \
          --cluster-node-timeout 5000 \
          --requirepass testpassword123 \
          --masterauth testpassword123
    ports:
      - "7005:7005"
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.16
    volumes:
      - redis_node_6_data:/data

  redis-cluster-init:
    image: valkey/valkey:9-trixie
    container_name: pairline-redis-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    restart: "no"
    command:
      - /bin/sh
      - -lc
      - |
        set -e
        for target in \
          redis-node-1:7000 \
          redis-node-2:7001 \
          redis-node-3:7002 \
          redis-node-4:7003 \
          redis-node-5:7004 \
          redis-node-6:7005
        do
          host="$${target%:*}"
          port="$${target#*:}"
          until valkey-cli -h "$$host" -p "$$port" -a testpassword123 PING >/dev/null 2>&1; do
            sleep 1
          done
        done

        if valkey-cli -h redis-node-1 -p 7000 -a testpassword123 cluster info 2>/dev/null | grep -q 'cluster_state:ok'; then
          echo "Redis cluster already initialized"
          exit 0
        fi

        yes yes | valkey-cli --cluster create \
          redis-node-1:7000 \
          redis-node-2:7001 \
          redis-node-3:7002 \
          redis-node-4:7003 \
          redis-node-5:7004 \
          redis-node-6:7005 \
          --cluster-replicas 1 \
          -a testpassword123
    networks:
      redis_cluster:
        ipv4_address: 172.31.0.20

volumes:
  redis_node_1_data:
  redis_node_2_data:
  redis_node_3_data:
  redis_node_4_data:
  redis_node_5_data:
  redis_node_6_data:

networks:
  redis_cluster:
    name: pairline_redis_cluster
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
