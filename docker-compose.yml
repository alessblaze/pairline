version: '3.8'

services:
  redis:
    image: valkey/valkey:9-trixie
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: valkey-server --appendonly yes --requirepass testpassword123

  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: omegle
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:

# ---------------------------------------------------------------------------
# IPv6 networking (optional)
# Uncomment the block below and set ENABLE_IPV6=true in both service .env
# files to run the stack in dual-stack (IPv4 + IPv6) mode.
